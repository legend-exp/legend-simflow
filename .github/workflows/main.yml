name: legend-simflow

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - "releases/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3

jobs:
  pre-commit:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Set up Julia
        uses: julia-actions/setup-julia@v3
        with:
          version: "1.10"
      - name: Set up JuliaFormatter
        run: julia -e 'using Pkg; Pkg.add("JuliaFormatter")'
      - uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure

  unit-tests:
    name: Run legend-simflow unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install non-python (homebrew) dependencies
        if: ${{ matrix.os == 'macOS-latest' }}
        run: |
          brew update
          brew install opencascade cgal gmp mpfr boost
      - name: Get dependencies and install legend-simflow
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install --upgrade .[test]
      - name: Run unit tests
        run: |
          python -m pytest -m "not needs_remage and not needs_julia"

  unit-tests-pixi:
    name: Run legend-simflow unit tests (pixi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          environments: test

      - name: Run unit tests
        run: |
          pixi run -e test test-python-pixi

      - name: Upload Coverage to codecov.io
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  test-workflow:
    name: Test LEGEND-1000 workflow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          environments: test

      - name: Run tests
        run: |
          pixi run -e test test-l1000-workflow

  test_julia:
    name: Run Julia tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: prefix-dev/setup-pixi@v0
        with:
          environments: test
      - name: Run Julia tests with coverage
        run: |
          pixi run -e test test-julia-ci
      - name: Process Julia coverage
        uses: julia-actions/julia-processcoverage@v1
        with:
          directories: workflow/src/LegendSimflow.jl/src
      - name: Upload Julia coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          flags: julia
