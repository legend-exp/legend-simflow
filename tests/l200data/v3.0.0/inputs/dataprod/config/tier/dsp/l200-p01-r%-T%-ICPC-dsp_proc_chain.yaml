processors:
  wf_presum:
    description: divide waveform by presum factor
    function: divide
    module: numpy
    args:
      - waveform_presummed
      - presum_rate
      - wf_presum(len(waveform_presummed), 'float32')
    unit:
      - ADC
  tp_min, tp_max, wf_min, wf_max:
    description: find max and min of presummed waveform with corresponding time points
    function: min_max
    module: dspeed.processors
    args:
      - wf_presum
      - tp_min
      - tp_max
      - wf_min
      - wf_max
    unit:
      - ns
      - ns
      - ADC
      - ADC
  wf_mean , wf_std, wf_slope, wf_intercept:
    description: finds mean and rms of whole presummed waveform
    function: linear_slope_fit
    module: dspeed.processors
    args:
      - wf_presum
      - wf_mean
      - wf_std
      - wf_slope
      - wf_intercept
    unit:
      - ADC
      - ADC
      - ADC
      - ADC
  wf_slope_diff , wf_slope_rms:
    description: finds mean and rms relative to linear fit of the waveform
    function: linear_slope_diff
    module: dspeed.processors
    args:
      - wf_presum
      - wf_slope
      - wf_intercept
      - wf_slope_diff
      - wf_slope_rms
    unit:
      - ADC
      - ADC
  tp_min_win, tp_max_win, wf_min_win, wf_max_win:
    description: find max and min of windowed waveform with corresponding time points
    function: min_max
    module: dspeed.processors
    args:
      - waveform_windowed(len(waveform_windowed),'f')
      - tp_min_win
      - tp_max_win
      - wf_min_win
      - wf_max_win
    unit:
      - ns
      - ns
      - ADC
      - ADC
  bl_mean_win , bl_std_win, bl_slope_win, bl_intercept_win:
    description:
      finds mean and rms of windowed waveform baseline (first 3us) as well as
      linear fit to this
    function: linear_slope_fit
    module: dspeed.processors
    args:
      - "waveform_windowed(len(waveform_windowed),'H')[0: 187]"
      - bl_mean_win
      - bl_std_win
      - bl_slope_win
      - bl_intercept_win
    unit:
      - ADC
      - ADC
      - ADC
      - ADC
  wf_blsub_win:
    description: baseline subtraction using mean of windowed baseline
    function: bl_subtract
    module: dspeed.processors
    args:
      - waveform_windowed(len(waveform_windowed),'H')
      - bl_mean
      - wf_blsub_win(len(waveform_windowed),'f')
    unit: ADC
  wf_pz_win:
    description: pole zero correction using value from database
    function: double_pole_zero
    module: dspeed.processors
    args:
      - wf_blsub_win
      - db.pz.tau1
      - db.pz.tau2
      - db.pz.frac
      - wf_pz_win
    unit: ADC
    defaults:
      db.pz.tau1: 450*us
      db.pz.tau2: 1*us
      db.pz.frac: 0
  t0_kernel:
    description: build modified asymmetric trap filter for t0 estimation
    function: t0_filter
    module: dspeed.processors
    args:
      - 128*ns/wf_pz_win.period
      - 2*us/wf_pz_win.period
      - t0_kernel(round((128*ns+2*us)/wf_pz_win.period), 'f')
    unit: ADC
  wf_t0_filter:
    description:
      modified asymmetric trap filter which is convolved with waveform to remove
      noise while preserving leading edge
    function: fft_convolve_wf
    module: dspeed.processors
    args:
      - wf_pz_win
      - t0_kernel
      - "'f'"
      - wf_t0_filter(len(wf_pz_win)+round((128*ns+2*us)/wf_pz_win.period)-1,
        'f', grid=wf_pz_win.grid)
    unit: ADC
  wf_atrap:
    description: asymmetric trap filter for t0 estimation
    function: asym_trap_filter
    module: dspeed.processors
    args:
      - wf_pz_win
      - 128*ns
      - 64*ns
      - 2*us
      - wf_atrap
    unit: ADC
  wf_t0_smooth:
    description: apply moving windows to smooth t0 filter
    function: moving_window_multi
    module: dspeed.processors
    args:
      - wf_t0_filter
      - "32"
      - 2
      - 0
      - wf_t0_smooth
    unit: ADC/sample
  conv_tmin ,tp_start, conv_min, conv_max:
    description: max of t0_filtered waveform to start backwards walk
    function: min_max
    module: dspeed.processors
    args:
      - wf_t0_smooth[:1400]
      - conv_tmin
      - tp_start
      - conv_min
      - conv_max
    unit:
      - ns
      - ns
      - ADC
      - ADC
  tp_0_atrap:
    description:
      walks backwards through asymmetric trap convolved waveform until below
      threshold which defines t0
    function: time_point_thresh
    module: dspeed.processors
    args:
      - wf_atrap
      - bl_std_win
      - tp_start
      - 0
      - tp_0_atrap
    unit: ns
  tp_0_est:
    description:
      walks backwards through t0_filter convolved waveform until below threshold
      which defines t0
    function: time_point_thresh
    module: dspeed.processors
    args:
      - wf_t0_filter
      - bl_std_win
      - tp_start
      - 0
      - tp_0_est(unit=ns)
    unit: ns
  bl_mean , bl_std, bl_slope, bl_intercept:
    description:
      finds mean and rms of presummed waveform baseline (first 44.5us) as well
      as linear fit to this
    function: linear_slope_fit
    module: dspeed.processors
    args:
      - "wf_presum[0: round(44.5*us, wf_presum.period)]"
      - bl_mean
      - bl_std
      - bl_slope
      - bl_intercept
    unit:
      - ADC
      - ADC
      - ADC
      - ADC
  bl_slope_diff , bl_slope_rms:
    description: finds mean and rms relative to linear fit of the baseline section
    function: linear_slope_diff
    module: dspeed.processors
    args:
      - "wf_presum[0: round(44.5*us, wf_presum.period)]"
      - bl_slope
      - bl_intercept
      - bl_slope_diff
      - bl_slope_rms
    unit:
      - ADC
      - ADC

  bl_pars:
    description: "finds "
    function: poly_fit
    module: dspeed.processors
    args:
      - "wf_presum[: round(44.5*us, wf_presum.period)]"
      - bl_pars(4, 'f')
    init_args:
      - "len(wf_presum[0: round(44.5*us, wf_presum.period)])"
      - "3"
    unit: ADC
  bl_poly_diff, bl_poly_rms:
    description: finds residual of quadratic fit of the logged tail
    function: poly_diff
    module: dspeed.processors
    args:
      - "wf_presum[: round(44.5*us, wf_presum.period)]"
      - bl_pars
      - bl_poly_diff
      - bl_poly_rms
    unit:
      - ADC
      - ADC

  wf_logged:
    function: log_check
    module: dspeed.processors
    args:
      - wf_presum
      - wf_logged
    unit: ADC
  wf_blsub:
    description: baseline subtraction using mean of presummed baseline
    function: bl_subtract
    module: dspeed.processors
    args:
      - wf_presum
      - bl_mean
      - wf_blsub
    unit: ADC
  tail_pars:
    description: "finds "
    function: poly_fit
    module: dspeed.processors
    args:
      - wf_logged[round(60*us, wf_logged.period):]
      - tail_pars(5, 'f')
    init_args:
      - len(wf_logged[round(60*us, wf_logged.period):])
      - "4"
    unit: ADC
  tail_slope: tail_pars[1]
  tail_diff, tail_rms:
    description: finds residual of quadratic fit of the logged tail
    function: poly_exp_rms
    module: dspeed.processors
    args:
      - wf_presum[round(60*us, wf_logged.period):]
      - tail_pars
      - tail_diff
      - tail_rms
    unit:
      - ADC
      - ADC
  wf_pz:
    description: pole zero correction using value from database
    function: double_pole_zero
    module: dspeed.processors
    args:
      - wf_blsub
      - db.pz.tau1
      - db.pz.tau2
      - db.pz.frac
      - wf_pz
    unit: ADC
    defaults:
      db.pz.tau1: 450*us
      db.pz.tau2: 1*us
      db.pz.frac: 0
  pz_mean , pz_std, pz_slope, pz_intercept:
    description:
      finds mean and rms of presummed waveform decay tail after pz correction
      (last 48us) as well as linear fit to this, should be far enough in to
      avoid short exponential term
    function: linear_slope_fit
    module: dspeed.processors
    args:
      - wf_pz[round(len(wf_pz) - 30*us/wf_pz.period):]
      - pz_mean
      - pz_std
      - pz_slope
      - pz_intercept
    unit:
      - ADC
      - ADC
      - ADC
      - ADC
  pz_slope_diff, pz_slope_rms:
    description: finds mean and rms relative to linear fit of the pole zero corrected tail
    function: linear_slope_diff
    module: dspeed.processors
    args:
      - wf_pz[round(len(wf_pz) - 30*us/wf_pz.period):]
      - pz_slope
      - pz_intercept
      - pz_slope_diff
      - pz_slope_rms
    unit:
      - ADC
      - ADC
  dwt_haar:
    description:
      performs a DWT with Haar wavelets and 2 levels on baseline subtracted
      waveform
    function: discrete_wavelet_transform
    module: dspeed.processors
    args:
      - wf_blsub
      - 2
      - "'h'"
      - "'a'"
      - dwt_haar( -(-len(wf_blsub)//4) , 'f')
    unit: ADC
  dwt_tp_min, dwt_tp_max, dwt_min, dwt_max:
    description: finds min/max and corresponding timepoints of the DWT
    function: min_max
    module: dspeed.processors
    args:
      - dwt_haar
      - dwt_tp_min
      - dwt_tp_max
      - dwt_min
      - dwt_max
    unit:
      - ns
      - ns
      - ADC
      - ADC
  dwt_norm:
    description: normalizes DWT by its min/max, whichever us greater in absolute value
    function: min_max_norm
    module: dspeed.processors
    args:
      - dwt_haar
      - dwt_min
      - dwt_max
      - dwt_norm
    unit:
      - ADC
  svm_label:
    description: loads a SVM model and predicts a data cleaning label on the normalized DWT
    function: svm_predict
    module: dspeed.processors
    args:
      - dwt_norm
      - svm_label
    unit: ADC
    prereqs:
      - dwt_norm
    init_args:
      - db.svm.model_file
    defaults:
      db.svm.model_file: "0"
  wf_trap:
    description: fixed length trap filter with long integration time run over all detectors
    function: trap_norm
    module: dspeed.processors
    args:
      - wf_pz
      - db.ttrap.rise
      - db.ttrap.flat
      - wf_trap
    unit: ADC
    defaults:
      db.ttrap.rise: 10*us
      db.ttrap.flat: 3.008*us
  tp_trapTmin, tp_trapTmax, trapTmin, trapTmax:
    description: max of fixed length long trap filter
    function: min_max
    module: dspeed.processors
    args:
      - wf_trap[round(2*db.ttrap.rise+db.ttrap.flat,
        wf_pz.period):]
      - tp_trapTmin
      - tp_trapTmax
      - trapTmin
      - trapTmax
    unit:
      - ns
      - ns
      - ADC
      - ADC
    defaults:
      db.ttrap.rise: 10*us
      db.ttrap.flat: 3.008*us
  trapTftp:
    description: sample trap filter on waveform to get measure of  energy
    function: fixed_time_pickoff
    module: dspeed.processors
    args:
      - wf_trap
      - round(tp_0_est+db.ttrap.rise+db.ttrap.flat*db.ttrap.sample,
        wf_trap.grid)
      - "'n'"
      - trapTftp
    defaults:
      db.ttrap.rise: 10*us
      db.ttrap.flat: 3.008*us
      db.ttrap.sample: "0.8"
    unit: ADC
  wf_trap_short:
    description:
      fixed length trap filter with short integration time run over all
      detectors
    function: trap_norm
    module: dspeed.processors
    args:
      - wf_pz
      - db.strap.rise
      - db.strap.flat
      - wf_trap_short
    unit: ADC
    defaults:
      db.strap.rise: 4*us
      db.strap.flat: 3.008*us
  trapSmax:
    description: max of fixed length short trap filter
    function: amax
    module: numpy
    args:
      - wf_trap_short[round(2*db.strap.rise+db.strap.flat,
        wf_pz.period):]
      - 1
      - trapSmax
    kwargs:
      signature: (n),()->()
      types:
        - fi->f
    defaults:
      db.strap.rise: 4*us
      db.strap.flat: 3.008*us
    unit: ADC
  wf_pileup_trap:
    description:
      trap filter with short flat top and integration time used for finding
      pileup
    function: trap_norm
    module: dspeed.processors
    args:
      - wf_pz
      - 1.024*us
      - "0"
      - wf_pileup_trap
    unit: ADC
  baselineEmax:
    description: find max of baseline section after pileup filter for pileup cut
    function: amax
    module: numpy
    args:
      - wf_pileup_trap[round(2.048*us, wf_pileup_trap.period):round(45*us,
        wf_pileup_trap.period)]
      - "1"
      - baselineEmax
    kwargs:
      signature: (n),()->()
      types:
        - fi->f
    unit: ADC
  tailEmax:
    description: find max of tail section after pileup filter for pileup cut
    function: amax
    module: numpy
    args:
      - wf_pileup_trap[round(55*us, wf_pileup_trap.period):]
      - "1"
      - tailEmax
    kwargs:
      signature: (n),()->()
      types:
        - fi->f
    unit: ADC
  wf_rc_cr2:
    description: apply RC-CR^2 filter to the waveform to determine pileup
    function: rc_cr2
    module: dspeed.processors
    args:
      - wf_blsub
      - 300*ns
      - wf_rc_cr2
    unit: ADC
  bl_mean_rc_cr2 , bl_std_rc_cr2, bl_slope_rc_cr2, bl_intercept_rc_cr2:
    description:
      finds mean and rms of presummed waveform baseline (first 44.5us) as well
      as linear fit to this
    function: linear_slope_fit
    module: dspeed.processors
    args:
      - wf_rc_cr2[-100:]
      - bl_mean_rc_cr2
      - bl_std_rc_cr2
      - bl_slope_rc_cr2
      - bl_intercept_rc_cr2
    unit:
      - ADC
      - ADC
      - ADC
      - ADC
  pos_rc_cr2_thresh:
    description:
      positive threshold for the bi_level_zero_crossing_time_points function to
      look for pileup in RC-CR^2 waveform
    function: multiply
    module: numpy
    args:
      - bl_std_rc_cr2
      - 6
      - pos_rc_cr2_thresh
  neg_rc_cr2_thresh:
    description:
      negative threshold for the bi_level_zero_crossing_time_points function to
      look for pileup in RC-CR^2 waveform
    function: multiply
    module: numpy
    args:
      - bl_std_rc_cr2
      - -5
      - neg_rc_cr2_thresh
  rc_cr2_pileup_n_crossings, rc_cr2_pileup_polarity, rc_cr2_pileup_idxs:
    description:
      extract arrays of pileup event indices and polarities from RC-CR^2
      waveform
    function: bi_level_zero_crossing_time_points
    module: dspeed.processors
    args:
      - wf_rc_cr2
      - pos_rc_cr2_thresh
      - neg_rc_cr2_thresh
      - 2.5*us
      - 0
      - rc_cr2_pileup_n_crossings
      - rc_cr2_pileup_polarity(shape = 5)
      - rc_cr2_pileup_idxs(shape = 5)
  wf_etrap:
    description: optimised trap filter uses filter parameters from database
    function: trap_norm
    module: dspeed.processors
    args:
      - wf_pz
      - db.etrap.rise
      - db.etrap.flat
      - wf_etrap
    unit: ADC
    defaults:
      db.etrap.rise: 10*us
      db.etrap.flat: 3.008*us
  trapEmax:
    description: max of optimised trap filter
    function: amax
    module: numpy
    args:
      - wf_etrap[round(2*db.etrap.rise+db.etrap.flat,
        wf_pz.period):]
      - 1
      - trapEmax
    kwargs:
      signature: (n),()->()
      types:
        - fi->f
    defaults:
      db.etrap.rise: 10*us
      db.etrap.flat: 3.008*us
    unit: ADC
  trapEftp:
    description: samples optimised trap filter at time point 80% of way into flat top
    function: fixed_time_pickoff
    module: dspeed.processors
    args:
      - wf_etrap
      - round(tp_0_est+db.etrap.rise+db.etrap.flat*db.etrap.sample,
        wf_etrap.grid)
      - "'i'"
      - trapEftp
    unit: ADC
    defaults:
      db.etrap.rise: 10*us
      db.etrap.flat: 3*us
      db.etrap.sample: "0.8"
  cusp_kernel:
    description: optimised cusp filter uses filter parameters from database
    function: cusp_filter
    module: dspeed.processors
    args:
      - db.cusp.sigma/wf_pz.period
      - round(db.cusp.flat/wf_pz.period)
      - .inf
      - cusp_kernel(round((97.536*us/wf_pz.period)-(4.8*us/wf_pz.period)),
        'f')
    defaults:
      db.cusp.sigma: 20*us
      db.cusp.flat: 3*us
    unit: ADC
  wf_cusp:
    description: convolve optimised cusp filter
    function: fft_convolve_wf
    module: dspeed.processors
    args:
      - wf_pz[:(97.536*us/wf_pz.period)]
      - cusp_kernel
      - "'v'"
      - wf_cusp(round((4.8*us/wf_pz.period)+2), 'f')
    unit: ADC
  cuspTmin, cuspTmax, cuspEmin, cuspEmax:
    description: max of optimised cusp filter
    function: min_max
    module: dspeed.processors
    args:
      - wf_cusp
      - cuspTmin
      - cuspTmax
      - cuspEmin
      - cuspEmax
    unit:
      - ns
      - ns
      - ADC
      - ADC
  cuspEftp:
    description: samples optimised cusp filter at fixed point
    function: fixed_time_pickoff
    module: dspeed.processors
    args:
      - wf_cusp
      - round(2.1*us/wf_blsub.period)
      - "'n'"
      - cuspEftp
    unit: ADC
    defaults:
      db.cusp.flat: 3*us
  zac_kernel:
    description: optimised zac filter uses filter parameters from database
    function: zac_filter
    module: dspeed.processors
    args:
      - db.zac.sigma/wf_pz.period
      - round(db.zac.flat/wf_pz.period)
      - .inf
      - zac_kernel(round((97.536*us/wf_pz.period)-(4.8*us/wf_pz.period)),
        'f')
    defaults:
      db.zac.sigma: 20*us
      db.zac.flat: 3*us
    unit: ADC
  wf_zac:
    description: convolves optimised zac filter
    function: fft_convolve_wf
    module: dspeed.processors
    args:
      - wf_pz[:(97.536*us/wf_pz.period)]
      - zac_kernel
      - "'v'"
      - wf_zac(round((4.8*us/wf_pz.period)+2), 'f')
    unit: ADC
  zacEmax:
    description: max of optimised zac filter
    function: amax
    module: numpy
    args:
      - wf_zac
      - 1
      - zacEmax
    kwargs:
      signature: (n),()->()
      types:
        - fi->f
    unit: ADC
  zacEftp:
    description: samples optimised zac filter at fixed point
    function: fixed_time_pickoff
    module: dspeed.processors
    args:
      - wf_zac
      - round(2.1*us/wf_blsub.period)
      - "'n'"
      - zacEftp
    unit: ADC
    defaults:
      db.zac.flat: 3*us
  step_kernel:
    description: step filter
    function: step
    module: dspeed.processors
    args:
