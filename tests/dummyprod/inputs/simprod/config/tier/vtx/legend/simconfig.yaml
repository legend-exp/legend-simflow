hpge_surface:
  command: >-
    revertex hpge-surf-pos
    --detectors [VBCP]*
    --surface-type nplus
    --gdml {GDML_FILE}
    --out-file {OUTPUT_FILE}
    --n-events {N_EVENTS}
  product: positions

exotic_process:
  command: >-
    my-exotic-physics-generator
    --gdml {GDML_FILE}
    --out-file {OUTPUT_FILE}
    --n-events {N_EVENTS}
  product: kinematics

musun_hall_c:
  command: >-
    my-musun-like-generator
    --gdml {GDML_FILE}
    --out-file {OUTPUT_FILE}
    --n-events {N_EVENTS}
  product: kinematics_and_positions
