dead_layer_fraction: 0.5
buffer_len: 500*MB
simulate_psd_with_psl: true

eresmod_default:
  expression: FWHMLinear
  parameters:
    a: 0.5
    b: 0.001

aoeresmod_default:
  expression: SigmaFit
  parameters:
    a: 0.0001
    b: 0
    c: 1

psdcuts_default:
  aoe:
    low_side: -1.5
    high_side: 3

aoemeanmod_default:
  single_template:
    expression: a * x + b
    pars:
      a: 0
      b: 1
  psl:
    expression: a * x + b
    pars:
      a: 0
      b: 1
